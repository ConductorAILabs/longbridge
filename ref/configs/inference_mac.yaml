# LongLive 2.0 5B inference on Mac (MPS, bf16, no NVFP4)
model_kwargs:
  model_name: Wan2.2-TI2V-5B
  timestep_shift: 5.0
  num_frame_per_block: 8
  local_attn_size: 32

use_ema: false
output_folder: videos/mac_test
num_samples: 1
save_latents_only: false

data:
  data_path: test_prompts/single.txt
  image_or_video_shape:
  - 1
  - 8         # 8 latent frames (1 block) — single-block test
  - 48
  - 44        # native H latent
  - 80        # native W latent

inference:
  sampling_steps: 4
  sink_size: 8
  guidance_scale: 1.0
  # CRITICAL: official defaults are TRUE / 8. Issue #20/PR #21 documents
  # that having these off corrupts the KV sink across frames, producing
  # exactly the "noisy background drift" we were seeing.
  multi_shot_sink: true
  multi_shot_rope_offset: 8
  streaming_vae: false
  async_vae: false
  vae_type: wan
  vae_device: "mps"

checkpoints:
  generator_ckpt: longlive_models/LongLive-2.0-5B/model_bf16.pt

# No quantization — bf16 path only.
# model_quant left unset / false.

logging:
  seed: 0
